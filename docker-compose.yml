services:
  db:
    image: postgres:16
    container_name: placemux-db
    environment:
      POSTGRES_USER: placemux
      POSTGRES_PASSWORD: placemux_dev_pw
      POSTGRES_DB: placemux
    ports:
      - "5432:5432"
    volumes:
      - placemux_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U placemux"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  placemux_pgdata:
